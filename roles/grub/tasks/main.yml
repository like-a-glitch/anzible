- name: Set 'GRUB_TIMEOUT'
  ansible.builtin.lineinfile:
    line: 'GRUB_TIMEOUT=4'
    path: '/etc/default/grub'
    regexp: '^GRUB_TIMEOUT='
  notify: update grub

- name: Set 'GRUB_TIMEOUT_STYLE'
  ansible.builtin.lineinfile:
    line: 'GRUB_TIMEOUT_STYLE=menu'
    path: '/etc/default/grub'
    regexp: '^GRUB_TIMEOUT_STYLE='
  notify: update grub